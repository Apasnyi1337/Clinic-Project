<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в личный кабинет</title>
    <link rel="stylesheet" href="{% static "clinic/style.css" %}">
</head>
<body>
    <header>
        <h1>Вход в систему</h1>
        <p><a href="{% url 'index' %}">← На главную</a></p>
    </header>

    <hr>

    <main>
        {% if form.errors %}
            <p style="color: red;">Неверный логин или пароль. Попробуйте еще раз.</p>
        {% endif %}

        <form method="post" action="">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Войти</button>
        </form>
    </main>
</body>
</html>
